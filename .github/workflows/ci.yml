name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Shared DB connection for jobs that need it
  DATABASE_URL: postgresql://shiftfy:shiftfy_ci@localhost:5432/shiftfy_test
  DIRECT_URL: postgresql://shiftfy:shiftfy_ci@localhost:5432/shiftfy_test

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shiftfy
          POSTGRES_PASSWORD: shiftfy_ci
          POSTGRES_DB: shiftfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shiftfy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run Tests
        run: npx vitest run --reporter=verbose

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: npm audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shiftfy
          POSTGRES_PASSWORD: shiftfy_ci
          POSTGRES_DB: shiftfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shiftfy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Build Next.js
        run: npx next build
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shiftfy
          POSTGRES_PASSWORD: shiftfy_ci
          POSTGRES_DB: shiftfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shiftfy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npx next build
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || '' }}
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
