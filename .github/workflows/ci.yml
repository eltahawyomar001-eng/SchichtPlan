name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Shared DB connection for jobs that need it
  DATABASE_URL: postgresql://shiftfy:shiftfy_ci@localhost:5432/shiftfy_test
  DIRECT_URL: postgresql://shiftfy:shiftfy_ci@localhost:5432/shiftfy_test

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type Check
        run: npx tsc --noEmit

      - name: Multi-tenancy scope guard
        run: npm run lint:scope

      - name: Lint
        # Ratchet: warnings may not exceed today's count (120). Lower this number
        # as warnings are fixed; target is 0. New warnings fail the build.
        run: npx eslint . --max-warnings 120

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shiftfy
          POSTGRES_PASSWORD: shiftfy_ci
          POSTGRES_DB: shiftfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shiftfy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Materialize schema (ephemeral CI DB)
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Run Tests
        run: npx vitest run --reporter=verbose --coverage

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Match the npm version used to generate the lockfile (as every other job
      # does). Without this the job runs the runner's default npm, which resolves
      # the dependency tree differently and fails `npm ci` with spurious
      # "Missing: <pkg> from lock file" errors.
      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      # Production deps: stricter — fail on any high+ vulnerability.
      - name: npm audit (production dependencies, high+)
        run: npm audit --omit=dev --audit-level=high

      # All deps incl. dev/build: fail on CRITICAL only. This closes the gap that
      # let a critical dev-dependency vuln (vitest GHSA) ship unnoticed, while not
      # breaking the build on lower-severity, non-exploitable transitive findings
      # (e.g. postcss pinned inside next, which is build-time on trusted CSS).
      - name: npm audit (all dependencies, critical)
        run: npm audit --audit-level=critical

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shiftfy
          POSTGRES_PASSWORD: shiftfy_ci
          POSTGRES_DB: shiftfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shiftfy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Materialize schema (ephemeral CI DB)
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Build Next.js
        run: npx next build --turbopack
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: shiftfy
          POSTGRES_PASSWORD: shiftfy_ci
          POSTGRES_DB: shiftfy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shiftfy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Upgrade npm to match lockfile version
        run: npm install -g npm@11

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Materialize schema (ephemeral CI DB)
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL || '' }}
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
